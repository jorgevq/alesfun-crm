<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALESFUN CRM</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0d0d"/>
    <link rel="apple-touch-icon" href="images/icon-192x192.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- jsPDF para generar PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* Estilo base con tema Matrix/Hacker */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0d0d0d;
            color: #00ff41;
        }
        .matrix-bg {
            background-color: black;
            overflow: hidden;
            position: fixed;
            height: 100%;
            width: 100%;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .tab-button {
            @apply px-4 py-2 border-b-2 font-medium text-lg;
            border-color: transparent;
            color: #66c2ff; /* Celeste */
            transition: all 0.3s ease;
        }
        .tab-button.active {
            color: #00ff41; /* Verde Matrix */
            border-color: #00aaff; /* Azul */
        }
        .input-field {
            @apply w-full bg-gray-900 border border-blue-700 text-cyan-300 text-lg rounded-md p-2 focus:ring-2 focus:ring-cyan-400 focus:outline-none transition;
        }
        .btn-primary {
            @apply bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg shadow-md shadow-blue-900/50 transition duration-300 w-full;
        }
        .btn-secondary {
            @apply bg-gray-700 hover:bg-gray-600 text-cyan-300 font-bold py-2 px-4 rounded-lg shadow-md shadow-gray-900/50 transition duration-300 w-full;
        }
        .modal-backdrop {
            @apply fixed inset-0 bg-black bg-opacity-80 flex justify-center items-center z-50;
        }
        .modal-content {
            @apply bg-gray-900 border-2 border-blue-600 p-6 rounded-xl shadow-2xl shadow-blue-800/50;
        }
        /* Ocultar scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overscroll-none">

    <!-- PANTALLA DE CARGA MATRIX -->
    <div id="loading-screen" class="matrix-bg">
        <canvas id="matrix-canvas" class="matrix-canvas"></canvas>
        <h1 class="text-4xl z-10 text-cyan-300 animate-pulse">CARGANDO ALESFUN CRM...</h1>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div id="app-container" class="hidden h-screen flex flex-col max-w-4xl mx-auto p-2 md:p-4">
        <!-- CABECERA -->
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-3xl font-bold text-cyan-400">ALESFUN <span class="text-blue-500">CRM</span></h1>
            <div class="flex items-center space-x-2">
                <span id="sync-status" class="text-sm text-gray-400"></span>
                 <button id="manual-sync" class="text-blue-400 hover:text-cyan-300 transition"><i class="fas fa-sync fa-spin"></i> Sincronizar</button>
            </div>
        </header>

        <!-- PESTAÑAS DE NAVEGACIÓN -->
        <nav class="flex border-b border-blue-800 mb-4">
            <button class="tab-button active" data-tab="ventas">Ventas</button>
            <button class="tab-button" data-tab="recibos">Recibos</button>
            <button class="tab-button" data-tab="mas">Más Opciones</button>
        </nav>

        <!-- CONTENIDO DE PESTAÑAS -->
        <main class="flex-grow overflow-y-auto">
            <!-- PESTAÑA VENTAS -->
            <div id="tab-ventas" class="tab-content space-y-4">
                <!-- VENTA FORM -->
            </div>

            <!-- PESTAÑA RECIBOS -->
            <div id="tab-recibos" class="tab-content hidden space-y-4">
                <!-- RECIBOS FORM -->
            </div>

            <!-- PESTAÑA MÁS OPCIONES -->
            <div id="tab-mas" class="tab-content hidden space-y-4">
                 <!-- SUB-TABS -->
                 <div class="flex border-b border-blue-900 text-sm">
                    <button class="sub-tab-button active" data-subtab="inventario">Inventario</button>
                    <button class="sub-tab-button" data-subtab="clientes">Clientes</button>
                    <button class="sub-tab-button" data-subtab="cierres">Cierres</button>
                </div>
                <!-- MAS OPCIONES CONTENT -->
            </div>
        </main>
    </div>
    
    <!-- MODAL PARA NOTIFICACIONES -->
    <div id="notification-modal" class="modal-backdrop hidden">
        <div class="modal-content text-center w-11/12 md:w-1/3">
            <p id="notification-message" class="text-lg text-cyan-300 mb-4"></p>
            <button id="notification-ok" class="btn-primary w-1/2">OK</button>
        </div>
    </div>

    <script>
        // PEGA AQUÍ LA URL DE TU API DE APPS SCRIPT
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0Eo-hHnvVFESGW8LRVBrFGInzEUa6B8H2QDH4-tvac1OhUNBHxwy33WR8wb9vPIK8/exec';

        // Pega aquí el código del archivo app.js
        // Este código va dentro de la etiqueta <script> en index.html

document.addEventListener('DOMContentLoaded', () => {
    // ---- VARIABLES GLOBALES Y ESTADO DE LA APP ----
    const db = {
        clientes: [],
        inventario: [],
        offlineQueue: []
    };
    
    // ---- ELEMENTOS DEL DOM ----
    const loadingScreen = document.getElementById('loading-screen');
    const matrixCanvas = document.getElementById('matrix-canvas');
    const appContainer = document.getElementById('app-container');
    const notificationModal = document.getElementById('notification-modal');
    const notificationMessage = document.getElementById('notification-message');
    const notificationOkBtn = document.getElementById('notification-ok');

    // ---- INICIALIZACIÓN ----
    initMatrixEffect();
    initApp();

    function initApp() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(registration => console.log('Service Worker registrado con éxito:', registration))
                .catch(error => console.log('Error al registrar Service Worker:', error));
        }
        loadLocalData();
        fetchInitialData();
        setupEventListeners();
        renderVentasTab(); // Render inicial
    }
    
    // ---- EFECTO MATRIX ----
    function initMatrixEffect() {
       const ctx = matrixCanvas.getContext('2d');
       matrixCanvas.width = window.innerWidth;
       matrixCanvas.height = window.innerHeight;

       const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890@#$%^&*()*&^%+-/~{[|`]}';
       const fontSize = 16;
       const columns = matrixCanvas.width / fontSize;
       const drops = Array(Math.floor(columns)).fill(1);

       function draw() {
           ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
           ctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
           ctx.fillStyle = '#00ff41'; // Verde Matrix
           ctx.font = `${fontSize}px monospace`;

           for (let i = 0; i < drops.length; i++) {
               const text = letters.charAt(Math.floor(Math.random() * letters.length));
               ctx.fillText(text, i * fontSize, drops[i] * fontSize);

               if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) {
                   drops[i] = 0;
               }
               drops[i]++;
           }
       }
       const matrixInterval = setInterval(draw, 33);

       // Detener la animación después de un tiempo para mostrar la app
       setTimeout(() => {
           clearInterval(matrixInterval);
           loadingScreen.style.opacity = '0';
           setTimeout(() => {
               loadingScreen.style.display = 'none';
               appContainer.classList.remove('hidden');
           }, 500);
       }, 3000);
    }
    
    // ---- MANEJO DE DATOS (ONLINE/OFFLINE) ----

    function showNotification(message) {
        notificationMessage.textContent = message;
        notificationModal.classList.remove('hidden');
    }

    function hideNotification() {
        notificationModal.classList.add('hidden');
    }
    
    async function fetchInitialData() {
        // Lógica para obtener datos
    }

    // ---- RENDERIZADO DE VISTAS ----
    function renderVentasTab() {
        const container = document.getElementById('tab-ventas');
        container.innerHTML = `
            <p class="text-xl text-cyan-400">Nueva Venta / Pago</p>
            <!-- Formulario de venta aquí -->
        `;
    }

    // ---- MANEJADORES DE EVENTOS ----
    function setupEventListeners() {
        // Tabs Principales
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', e => {
                const tabName = e.target.dataset.tab;
                
                // Actualizar botones
                document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');

                // Actualizar contenido
                document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
                document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            });
        });
        
        notificationOkBtn.addEventListener('click', hideNotification);
    }
    
    // ---- FUNCIONES AUXILIARES ----
    function normalizeString(str) {
        if (typeof str !== 'string') return '';
        return str.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

});

    </script>
</body>
</html>
